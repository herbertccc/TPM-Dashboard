name: Build and Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - 'milestone/**'
      - 'Version_Plan/**'
      - 'build_dashboard.py'
      - '.github/workflows/deploy.yml'
  # 也支持手动触发（在 GitHub 网页上点按钮）
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 构建看板
        run: |
          python build_dashboard.py
          echo "构建输出："
          cat index.html | head -5

      - name: 准备 Pages 产物
        run: mkdir -p _site && cp index.html _site/

      - name: 配置 Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 钉钉群通知
        run: python notify_dingtalk.py "${{ steps.deployment.outputs.page_url }}"
